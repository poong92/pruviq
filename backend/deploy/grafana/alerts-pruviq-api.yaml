# PRUVIQ API — Grafana Cloud alert rules
#
# Import path: Grafana → Alerting → Alert rules → Import file
# Contact point: separate (wire in UI to Telegram webhook)
#
# Design notes:
#   - 5 rules covering: API down, HTTP 5xx, scan slow, OKX error rate,
#     SQLite contention. All driven off `/metrics` exposed by the
#     prometheus_client instrumentation shipped in PR #1197.
#   - "for" durations are tuned to absorb single scrape misses (Alloy
#     scrape_interval=60s → 2m minimum to dedupe a single drop).
#   - Only PruviqApiDown is "critical"; the rest are "warning" because
#     they're degradations, not outages.

apiVersion: 1

groups:
  - orgId: 1
    name: pruviq-api-core
    folder: PRUVIQ
    interval: 1m
    rules:
      # ─────────────────────────────────────────────────────────
      # 1. API Down — the scrape target itself is unreachable.
      # Triggers when Alloy's prometheus.scrape component can't reach
      # :8080/metrics for 2 consecutive minutes (i.e., 2+ failed scrapes).
      # ─────────────────────────────────────────────────────────
      - uid: pruviq_api_down
        title: PruviqApiDown
        condition: C
        data:
          - refId: A
            queryType: ""
            relativeTimeRange: { from: 300, to: 0 }
            datasourceUid: ${DS_PROMETHEUS_UID}
            model:
              # The `job` label is set by Alloy's scrape target to "pruviq-api"
              # (hyphen) in /etc/alloy/config.alloy — NOT the component name
              # `pruviq_api` (underscore). Mismatch here would permanently
              # produce NoData — a critical alert that never fires is worse
              # than no alert, because it looks like coverage you don't have.
              expr: up{job="pruviq-api"}
              intervalMs: 60000
              maxDataPoints: 43200
              refId: A
          - refId: C
            queryType: ""
            relativeTimeRange: { from: 0, to: 0 }
            datasourceUid: __expr__
            model:
              conditions:
                - evaluator: { params: [1], type: lt }
                  operator: { type: and }
                  query: { params: [C] }
                  reducer: { params: [], type: last }
                  type: query
              datasource: { type: __expr__, uid: __expr__ }
              expression: A
              refId: C
              type: threshold
        noDataState: Alerting
        execErrState: Error
        for: 2m
        annotations:
          summary: "pruviq-api :8080 unreachable"
          description: "Alloy cannot scrape http://127.0.0.1:8080/metrics for 2 minutes. Check `systemctl status pruviq-api`."
          runbook_url: "https://github.com/pruviq/pruviq/blob/main/backend/deploy/grafana/README.md#pruviqapidown"
        labels:
          severity: critical
          service: pruviq-api

      # ─────────────────────────────────────────────────────────
      # 2. HTTP 5xx spike — server errors > 3 per minute for 5 minutes.
      # Detects regressions faster than the user-facing /health probe.
      # ─────────────────────────────────────────────────────────
      - uid: pruviq_http_5xx_spike
        title: PruviqHttp5xxSpike
        condition: C
        data:
          - refId: A
            queryType: ""
            relativeTimeRange: { from: 600, to: 0 }
            datasourceUid: ${DS_PROMETHEUS_UID}
            model:
              expr: sum(rate(pruviq_http_request_duration_seconds_count{status_class="5xx"}[5m]))
              intervalMs: 60000
              maxDataPoints: 43200
              refId: A
          - refId: C
            queryType: ""
            relativeTimeRange: { from: 0, to: 0 }
            datasourceUid: __expr__
            model:
              conditions:
                - evaluator: { params: [0.05], type: gt }
                  operator: { type: and }
                  query: { params: [C] }
                  reducer: { params: [], type: last }
                  type: query
              datasource: { type: __expr__, uid: __expr__ }
              expression: A
              refId: C
              type: threshold
        noDataState: OK
        execErrState: Error
        for: 5m
        annotations:
          summary: "Server 5xx error rate > 3/min"
          description: "pruviq-api is serving 5xx responses at > 0.05 req/s for 5+ minutes. Check journalctl -u pruviq-api and recent deploys."
        labels:
          severity: warning
          service: pruviq-api

      # ─────────────────────────────────────────────────────────
      # 3. Signal scan slow — p95 > 45s for 10 minutes.
      # Scanner has a 60s wait_for budget in the auto-trade loop.
      # 45s p95 = eating 75% of the budget, one bad scan pushes timeout.
      # ─────────────────────────────────────────────────────────
      - uid: pruviq_scan_slow
        title: PruviqScanSlow
        condition: C
        data:
          - refId: A
            queryType: ""
            relativeTimeRange: { from: 600, to: 0 }
            datasourceUid: ${DS_PROMETHEUS_UID}
            model:
              expr: histogram_quantile(0.95, sum(rate(pruviq_signal_scan_duration_seconds_bucket[5m])) by (le))
              intervalMs: 60000
              maxDataPoints: 43200
              refId: A
          - refId: C
            queryType: ""
            relativeTimeRange: { from: 0, to: 0 }
            datasourceUid: __expr__
            model:
              conditions:
                - evaluator: { params: [45], type: gt }
                  operator: { type: and }
                  query: { params: [C] }
                  reducer: { params: [], type: last }
                  type: query
              datasource: { type: __expr__, uid: __expr__ }
              expression: A
              refId: C
              type: threshold
        noDataState: OK
        execErrState: Error
        for: 10m
        annotations:
          summary: "Signal scan p95 > 45s"
          description: "signal_scanner.scan() p95 is > 45s for 10+ minutes — approaching the 60s auto-trade wait_for timeout. Check OHLCV freshness and GIL contention (top coins × strategies = CPU-bound)."
        labels:
          severity: warning
          service: pruviq-api
          component: signal-scanner

      # ─────────────────────────────────────────────────────────
      # 4. OKX error rate — non-2xx OKX API calls > 10% for 5 minutes.
      # OKX transient errors are normal; sustained 10%+ = broken auth,
      # rate limit burn, or a broken endpoint assumption.
      # ─────────────────────────────────────────────────────────
      - uid: pruviq_okx_error_rate
        title: PruviqOkxErrorRate
        condition: C
        data:
          - refId: A
            queryType: ""
            relativeTimeRange: { from: 600, to: 0 }
            datasourceUid: ${DS_PROMETHEUS_UID}
            model:
              expr: |
                sum(rate(pruviq_okx_api_calls_total{status_class!="2xx"}[5m]))
                /
                (sum(rate(pruviq_okx_api_calls_total[5m])) > 0)
              intervalMs: 60000
              maxDataPoints: 43200
              refId: A
          - refId: C
            queryType: ""
            relativeTimeRange: { from: 0, to: 0 }
            datasourceUid: __expr__
            model:
              conditions:
                - evaluator: { params: [0.1], type: gt }
                  operator: { type: and }
                  query: { params: [C] }
                  reducer: { params: [], type: last }
                  type: query
              datasource: { type: __expr__, uid: __expr__ }
              expression: A
              refId: C
              type: threshold
        noDataState: OK
        execErrState: Error
        for: 5m
        annotations:
          summary: "OKX API error rate > 10%"
          description: "More than 10% of OKX v5 API calls are returning non-2xx for 5+ minutes. Check OAuth token, rate limits, or recent OKX endpoint changes."
        labels:
          severity: warning
          service: pruviq-api
          component: okx

      # ─────────────────────────────────────────────────────────
      # 5. SQLite contention — busy_retries > 1/s for 5 minutes.
      # Steady non-zero means we're hitting the busy_timeout ceiling —
      # time to consider uvicorn workers>=2 tuning or async storage.
      # ─────────────────────────────────────────────────────────
      - uid: pruviq_sqlite_contention
        title: PruviqSqliteContention
        condition: C
        data:
          - refId: A
            queryType: ""
            relativeTimeRange: { from: 600, to: 0 }
            datasourceUid: ${DS_PROMETHEUS_UID}
            model:
              expr: rate(pruviq_sqlite_busy_retries_total[5m])
              intervalMs: 60000
              maxDataPoints: 43200
              refId: A
          - refId: C
            queryType: ""
            relativeTimeRange: { from: 0, to: 0 }
            datasourceUid: __expr__
            model:
              conditions:
                - evaluator: { params: [1.0], type: gt }
                  operator: { type: and }
                  query: { params: [C] }
                  reducer: { params: [], type: last }
                  type: query
              datasource: { type: __expr__, uid: __expr__ }
              expression: A
              refId: C
              type: threshold
        noDataState: OK
        execErrState: Error
        for: 5m
        annotations:
          summary: "SQLite busy_retries > 1/s"
          description: "SQLite writer lock contention is persistent. Check autotrade_live.db usage; consider tuning busy_timeout or moving to a single writer pattern."
        labels:
          severity: warning
          service: pruviq-api
          component: sqlite

      # ─────────────────────────────────────────────────────────
      # 6. OHLCV refresh stale — last successful run older than 2h.
      # Timer is hourly (changed from 4h on 2026-04-21). >2h = at least
      # one full cycle missed plus buffer. Stronger signal than counting
      # errors (catches "script stopped running entirely", which no error
      # counter would detect). Threshold tightened from 5h to 2h to match
      # the new hourly cadence — otherwise we'd silently tolerate 3-4
      # consecutive missed refreshes.
      # ─────────────────────────────────────────────────────────
      - uid: pruviq_ohlcv_stale
        title: PruviqOhlcvStale
        condition: C
        data:
          - refId: A
            queryType: ""
            relativeTimeRange: { from: 600, to: 0 }
            datasourceUid: ${DS_PROMETHEUS_UID}
            model:
              # time() is seconds since epoch; timestamp gauge is also
              # epoch seconds. Difference > 7200 = 2 hours.
              expr: (time() - pruviq_ohlcv_last_run_timestamp_seconds)
              intervalMs: 60000
              maxDataPoints: 43200
              refId: A
          - refId: C
            queryType: ""
            relativeTimeRange: { from: 0, to: 0 }
            datasourceUid: __expr__
            model:
              conditions:
                - evaluator: { params: [7200], type: gt }
                  operator: { type: and }
                  query: { params: [C] }
                  reducer: { params: [], type: last }
                  type: query
              datasource: { type: __expr__, uid: __expr__ }
              expression: A
              refId: C
              type: threshold
        noDataState: Alerting
        execErrState: Error
        for: 10m
        annotations:
          summary: "OHLCV refresh hasn't run for 2+ hours"
          description: "pruviq-update-ohlcv timer (every 4h) appears stopped. Check `ssh DO 'systemctl status pruviq-update-ohlcv.timer'` and the status file at /opt/pruviq/shared/ohlcv_last_run.json."
        labels:
          severity: warning
          service: pruviq-api
          component: ohlcv

      # ─────────────────────────────────────────────────────────
      # 7. OHLCV per-symbol failure surge — rate_limit spike.
      # The script tolerates per-symbol failures (keeps going), but a
      # sustained rate_limit count means we're hitting OKX budget
      # ceiling or the window_sec in market_fetcher needs tuning.
      # Threshold 20 = ~10% of 238 symbols, tuned to detect systemic
      # 429 vs 1-2 transient ones.
      # ─────────────────────────────────────────────────────────
      - uid: pruviq_ohlcv_rate_limit_surge
        title: PruviqOhlcvRateLimitSurge
        condition: C
        data:
          - refId: A
            queryType: ""
            relativeTimeRange: { from: 600, to: 0 }
            datasourceUid: ${DS_PROMETHEUS_UID}
            model:
              expr: pruviq_ohlcv_last_run_failures{reason="rate_limit"}
              intervalMs: 60000
              maxDataPoints: 43200
              refId: A
          - refId: C
            queryType: ""
            relativeTimeRange: { from: 0, to: 0 }
            datasourceUid: __expr__
            model:
              conditions:
                - evaluator: { params: [20], type: gt }
                  operator: { type: and }
                  query: { params: [C] }
                  reducer: { params: [], type: last }
                  type: query
              datasource: { type: __expr__, uid: __expr__ }
              expression: A
              refId: C
              type: threshold
        noDataState: OK
        execErrState: Error
        for: 5m
        annotations:
          summary: "OHLCV refresh: >20 symbols hit rate_limit last run"
          description: "OKX 429s dominated the last OHLCV refresh — either OKX tightened their budget or our window_sec in okx/market_fetcher.py is too aggressive."
        labels:
          severity: warning
          service: pruviq-api
          component: ohlcv
