# gitleaks config — extends defaults + allowlists known false positives.
#
# Background (BD Jun Kim 2026-04-28):
#   OKX broker code values are public identifiers, not secrets. They appear in
#   OAuth URL `channelId` params and order POST `tag` fields by design — every
#   client interacting with OKX through this app sees them. They were assigned
#   to PRUVIQ via the OKX broker program and are documented in onboarding
#   email threads. The values below are the OAuth + API broker codes plus the
#   placeholder marker we use in .env.example.
#
# Why an allowlist instead of removing them from history:
#   1. Force-push to public PRs is forbidden by /loop governance (multi-session
#      race surface).
#   2. The values are already public — both broker codes appear in the OKX
#      partner registry and were emailed in BD onboarding (Jun Kim, 2026-04-28).
#      "Hiding" them via history rewrite is theatre, not security.
#   3. Documenting them here as known-public values is the honest signal to
#      future operators: gitleaks generic-api-key entropy false-positives on
#      OKX broker code format. If real secrets ever leak with similar entropy,
#      the allowlist is intentionally narrow (exact strings) and won't mask
#      them.
#
# Additional false positives added 2026-05-04:
#   OPENCLAW docs: docs/OPENCLAW_RESEARCH_20260214.md and docs/OPENCLAW_ROADMAP.md
#     contain example `curl -u user:pass` and `curl -H Authorization:` commands in
#     research documentation. These files were deleted from the working tree in
#     cleanup PRs but exist in git history. curl-auth-header / curl-auth-user rules
#     fire on example documentation, not real credentials.
#   i18n strings: src/i18n/en.ts and ko.ts contain "Free open REST API" /
#     "무료 오픈 REST API" as user-facing UI copy. generic-api-key rule fires on
#     the word "API" in a key-value context — false positive.
#   backend/.coingecko_key: CoinGecko API key file committed to history in early
#     development, rotated to environment variable before public launch.

[extend]
useDefault = true

# gitleaks v8.24 uses singular `[allowlist]` (array form `[[allowlists]]`
# was added later). regexTarget="match" tests against the captured secret.
# Using paths (file-level skip), regexes (value match), and commits (origin
# commit) — belt and braces against gitleaks v8.24 regex engine quirks.
[allowlist]
description = "Known false positives: OKX broker codes, OPENCLAW historical docs, i18n API text, CoinGecko key (2026-05-04)"
regexTarget = "match"
regexes = [
    # OKX broker codes — public identifiers, not secrets (BD Jun Kim 2026-04-28)
    '''c12571e26a02OCDE''',
    '''5f7403144b80BCDE''',
    # i18n strings "Free open REST API" — UI display copy in en.ts/ko.ts, not a secret
    '''Free open REST API''',
    '''open REST API''',
]
paths = [
    # OPENCLAW research docs (deleted from working tree, historical only) —
    # contain example curl -u / curl -H Authorization commands in documentation
    '''docs/OPENCLAW_RESEARCH_20260214\.md''',
    '''docs/OPENCLAW_ROADMAP\.md''',
    # CoinGecko API key committed in early development — rotated to env var before launch
    '''backend/\.coingecko_key''',
]
commits = [
    # OKX broker code commit (2026-04-28)
    "d842ebf364e79d9c95f2e8c5003420e372c687a5",
    # i18n "Free open REST API" generic-api-key false positives
