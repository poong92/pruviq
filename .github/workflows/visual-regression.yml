name: Visual Regression

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      update_snapshots:
        description: "Update baseline snapshots and commit"
        type: boolean
        default: false

permissions:
  contents: write
  pull-requests: write

jobs:
  visual-regression:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # push시 커밋을 위해 토큰 필요
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Build site
        run: npm run build
        env:
          PUBLIC_API_URL: https://api.pruviq.com

      - name: Run visual regression tests (PR — compare)
        if: github.event_name == 'pull_request'
        run: npx playwright test tests/e2e/visual-regression.spec.ts --project=desktop
        continue-on-error: true
        id: visual_test

      - name: Upload diff artifacts (PR)
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: visual-regression-diff
          path: |
            playwright-report/
            test-results/
          retention-days: 14

      - name: Fail if screenshots differ
        if: github.event_name == 'pull_request' && steps.visual_test.outcome == 'failure'
        run: |
          echo "Visual regression detected. Review diffs in artifacts: visual-regression-diff"
          echo "To update baselines: gh workflow run visual-regression.yml -f update_snapshots=true"
          exit 1

      - name: Update baselines (main push or manual)
        if: github.event_name == 'push' || inputs.update_snapshots == true
        run: npx playwright test tests/e2e/visual-regression.spec.ts --project=desktop --update-snapshots || true
        env:
          PUBLIC_API_URL: https://api.pruviq.com

      - name: Commit updated snapshots
        if: github.event_name == 'push' || inputs.update_snapshots == true
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add tests/e2e/__snapshots__/ || true
          git diff --staged --quiet || git commit -m "chore: update visual regression baselines [skip ci]"
          git push || true
