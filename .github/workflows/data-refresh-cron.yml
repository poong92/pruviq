# Data Refresh Cron — replaces local Mac Mini `*/20 refresh_static.sh` cron.
#
# 회귀 (2026-04-20 fix): branch ruleset 'main-branch-protection' 활성화 후
# 로컬 cron이 main 직접 push 시도하면 silent fail (bypass_actors=[]).
# → ruleset 의도(PR 통과만 허용)와 충돌. 원론 fix: cron이 PR 만들어 통과.
#
# 동작:
#   1. 매 20분 schedule + workflow_dispatch
#   2. backend/scripts/refresh_static.py 실행 (로컬 cron과 동일 로직)
#   3. public/data/ 변경 있으면 dedicated 브랜치(`auto/data-refresh`)에 force push
#   4. PR 1개 유지 (automerge 라벨) — peter-evans/create-pull-request가 같은 브랜치 update
#   5. 머지 schedule(`*/10` automerge cron)이 다음 tick에 머지 → data-deploy.yml trigger
#
# 빈도 trade-off:
#   - 60분 cron: E2E(12min) vs data-refresh 충돌 확률 20% (20분 대비 60% → 3x 개선)
#   - feature PR들이 update-branch 후 E2E 12분 내에 완주할 여유 확보
#   - 2026-05-09: 20min→60min 변경. 이유: 20min 간격으로 main이 앞서면서
#     feature PR E2E가 계속 리셋되는 구조적 레이스 컨디션 해소 목적.
#     market/signals 등 시간민감 페이지는 client-side live hook이 30s 이내
#     갱신하므로 60min 정적 데이터는 first-paint/SEO에만 영향.

name: Data Refresh Cron
on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  actions: write

concurrency:
  group: data-refresh-cron
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout main
        uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 1

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Run refresh_static.py
        env:
          # refresh_static.py는 외부 API (Binance, CoinGecko, FRED) 호출
          # GitHub-hosted runner는 IP 변동 큼 — Binance/CoinGecko는 한국 IP 차단 없으니 OK
          PYTHONUNBUFFERED: "1"
        run: |
          python3 backend/scripts/refresh_static.py

      - name: Update site-stats.json (coins, strategies from prod API)
        run: |
          python3 - <<'PY'
          import json, datetime, urllib.request, sys
          HEADERS = {"User-Agent": "PRUVIQ-Cron/1.0 (https://pruviq.com)"}
          def fetch(url, timeout=10):
              req = urllib.request.Request(url, headers=HEADERS)
              return json.loads(urllib.request.urlopen(req, timeout=timeout).read())
          path = "public/data/site-stats.json"
          with open(path) as f:
              d = json.load(f)
          try:
              health = fetch("https://api.pruviq.com/health")
              d["coins_analyzed"] = health.get("coins_loaded", d.get("coins_analyzed", 240))
          except Exception as e:
              print(f"WARN: /health fetch failed — coins_analyzed unchanged ({e.__class__.__name__}: {e})", file=sys.stderr)
          try:
              strats = fetch("https://api.pruviq.com/strategies")
              d["strategies_tested"] = len(strats) if isinstance(strats, list) else d.get("strategies_tested", 17)
          except Exception as e:
              print(f"WARN: /strategies fetch failed — strategies_tested unchanged ({e.__class__.__name__}: {e})", file=sys.stderr)
          start = datetime.date(2023, 12, 30)
          d["trading_days"] = (datetime.date.today() - start).days
          d["last_updated"] = datetime.date.today().isoformat()
          with open(path, "w") as f:
              json.dump(d, f)
          print("site-stats.json updated")
          PY

      - name: Fetch daily rankings
        run: |
          curl -sf --max-time 15 "https://api.pruviq.com/rankings/daily" \
            -o public/data/rankings-daily.json.tmp \
            && mv public/data/rankings-daily.json.tmp public/data/rankings-daily.json \
            && echo "rankings updated" \
            || echo "rankings fetch failed (non-critical)"

      - name: Detect changes
        id: changes
        run: |
          if git diff --quiet public/data/; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            echo "No data changes — skipping PR"
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
            echo "Changed files:"
            git diff --stat public/data/
          fi

      - name: Create or update PR
        id: create-pr
        if: steps.changes.outputs.has_changes == 'true'
        uses: peter-evans/create-pull-request@v8
        with:
          # AUTOMERGE_PAT required: GITHUB_TOKEN PRs don't fire pull_request events
          # → CI never appears in statusCheckRollup → automerge blocked forever.
          # PAT-created PRs fire pull_request.opened/synchronize → CI in rollup → mergeable.
          token: ${{ secrets.AUTOMERGE_PAT || secrets.GITHUB_TOKEN }}
          branch: auto/data-refresh
          delete-branch: false
          base: main
          title: "chore(data): cron auto-refresh (every 60min)"
          body: |
            Automated data refresh from `data-refresh-cron.yml` workflow.

            This PR is **continuously updated** — last refresh embedded in commit message.

            **Replaces**: local Mac Mini `*/20 refresh_static.sh` cron (silent-failing since 2026-04-20 ruleset activation).
          commit-message: |
            chore(data): cron refresh
          author: "github-actions[bot] <github-actions[bot]@users.noreply.github.com>"
          committer: "github-actions[bot] <github-actions[bot]@users.noreply.github.com>"
          labels: automerge
          add-paths: |
            public/data/**

