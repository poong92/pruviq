# Data Refresh Cron — replaces local Mac Mini `*/20 refresh_static.sh` cron.
#
# 회귀 (2026-04-20 fix): branch ruleset 'main-branch-protection' 활성화 후
# 로컬 cron이 main 직접 push 시도하면 silent fail (bypass_actors=[]).
# → ruleset 의도(PR 통과만 허용)와 충돌. 원론 fix: cron이 PR 만들어 통과.
#
# 동작:
#   1. 매 20분 schedule + workflow_dispatch
#   2. backend/scripts/refresh_static.py 실행 (로컬 cron과 동일 로직)
#   3. public/data/ 변경 있으면 dedicated 브랜치(`auto/data-refresh`)에 force push
#   4. PR 1개 유지 (automerge 라벨) — peter-evans/create-pull-request가 같은 브랜치 update
#   5. 머지 schedule(`*/10` automerge cron)이 다음 tick에 머지 → data-deploy.yml trigger
#
# 빈도 trade-off:
#   - 매 20분 cron tick + 최대 10분 머지 schedule + 5분 deploy = 사이트 반영까지 ~25-35분
#   - 로컬 cron(매 20분 직접 push)은 silent fail + 누적 8일이라 신선도 0
#   - 즉 이 workflow가 신선도 33-40배 개선

name: Data Refresh Cron
on:
  schedule:
    - cron: "*/20 * * * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: data-refresh-cron
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout main
        uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 1

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Run refresh_static.py
        env:
          # refresh_static.py는 외부 API (Binance, CoinGecko, FRED) 호출
          # GitHub-hosted runner는 IP 변동 큼 — Binance/CoinGecko는 한국 IP 차단 없으니 OK
          PYTHONUNBUFFERED: "1"
        run: |
          python3 backend/scripts/refresh_static.py

      - name: Update site-stats.json (coins, strategies from prod API)
        run: |
          python3 - <<'PY'
          import json, datetime, urllib.request, sys
          path = "public/data/site-stats.json"
          with open(path) as f:
              d = json.load(f)
          try:
              health = json.loads(urllib.request.urlopen("https://api.pruviq.com/health", timeout=10).read())
              d["coins_analyzed"] = health.get("coins_loaded", d.get("coins_analyzed", 240))
          except Exception as e:
              print(f"WARN: /health fetch failed — coins_analyzed unchanged ({e.__class__.__name__})", file=sys.stderr)
          try:
              strats = json.loads(urllib.request.urlopen("https://api.pruviq.com/strategies", timeout=10).read())
              d["strategies_tested"] = len(strats) if isinstance(strats, list) else d.get("strategies_tested", 17)
          except Exception as e:
              print(f"WARN: /strategies fetch failed — strategies_tested unchanged ({e.__class__.__name__})", file=sys.stderr)
          start = datetime.date(2023, 12, 30)
          d["trading_days"] = (datetime.date.today() - start).days
          d["last_updated"] = datetime.date.today().isoformat()
          with open(path, "w") as f:
              json.dump(d, f)
          print("site-stats.json updated")
          PY

      - name: Fetch daily rankings
        run: |
          curl -sf --max-time 15 "https://api.pruviq.com/rankings/daily" \
            -o public/data/rankings-daily.json.tmp \
            && mv public/data/rankings-daily.json.tmp public/data/rankings-daily.json \
            && echo "rankings updated" \
            || echo "rankings fetch failed (non-critical)"

      - name: Detect changes
        id: changes
        run: |
          if git diff --quiet public/data/; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            echo "No data changes — skipping PR"
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
            echo "Changed files:"
            git diff --stat public/data/
          fi

      # GitHub의 documented 한계: GITHUB_TOKEN으로 만든 PR은 다른 workflow trigger
      # 못 함. Vitest/Playwright 등 PR-trigger workflow가 안 돌아 → check runs 0 →
      # ruleset의 7 required checks 충족 못함 → automerge 영원히 stuck.
      # 해결: PRUVIQ_BOT_TOKEN (PAT 또는 GitHub App token) 사용.
      # secret 없으면 fallback으로 GITHUB_TOKEN + workflow_dispatch 추가 발화로 우회.
      - name: Create or update PR (with PAT for CI re-trigger)
        if: steps.changes.outputs.has_changes == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          # PRUVIQ_BOT_TOKEN: contents:write + pull-requests:write + workflows:write
          # 권한의 PAT 또는 fine-grained token. 사용자가 GitHub Settings → Developer
          # settings → Personal access tokens → Fine-grained tokens 에서 발급 후
          # repo Settings → Secrets → Actions에 PRUVIQ_BOT_TOKEN으로 저장.
          # 미설정 시 fallback (GITHUB_TOKEN) — PR은 만들어지지만 CI 안 돌아 manual
          # rekick 필요. 즉 마이그 효과 절반.
          token: ${{ secrets.PRUVIQ_BOT_TOKEN || secrets.GITHUB_TOKEN }}
          branch: auto/data-refresh
          delete-branch: false
          base: main
          title: "chore(data): cron auto-refresh (every 20min)"
          body: |
            Automated data refresh from `data-refresh-cron.yml` workflow.

            This PR is **continuously updated** — last refresh embedded in commit message.

            **Replaces**: local Mac Mini `*/20 refresh_static.sh` cron (silent-failing since 2026-04-20 ruleset activation).

            **CI trigger**: PRUVIQ_BOT_TOKEN (PAT) 사용 시 정상 trigger. GITHUB_TOKEN fallback 시 CI 안 돌아 manual rekick 필요.
          commit-message: |
            chore(data): cron refresh
          author: "github-actions[bot] <github-actions[bot]@users.noreply.github.com>"
          committer: "github-actions[bot] <github-actions[bot]@users.noreply.github.com>"
          labels: automerge
          add-paths: |
            public/data/**
