name: E2E Tests

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-node@v4
      with:
        node-version: '22'

    - name: Install dependencies
      run: npm ci

    - name: Install test dependencies
      run: npm install -D @playwright/test axe-core

    - name: Install Chromium
      run: npx playwright install --with-deps chromium

    - name: Check i18n key completeness
      run: npx tsx scripts/check-i18n-keys.ts

    - name: Build site
      run: npm run build

    # Root cause fix: verify production API is reachable before running API-dependent tests.
    # Distinguishes "API down" (infrastructure) from "test logic flaky" (code bug).
    - name: Check API health
      run: |
        echo "Checking api.pruviq.com reachability..."
        for i in {1..6}; do
          STATUS=$(curl -sf -o /dev/null -w "%{http_code}" \
            https://api.pruviq.com/health --max-time 10 || echo "000")
          if [ "$STATUS" = "200" ]; then
            echo "API healthy (attempt $i)"
            exit 0
          fi
          echo "Attempt $i: HTTP $STATUS — retrying in 10s..."
          sleep 10
        done
        echo "::warning::API unreachable after 60s — API-dependent tests will skip via skipInCI"

    - name: Run E2E tests
      id: e2e
      run: |
        npx playwright test tests/e2e/ \
          --timeout 90000 \
          --workers 1 \
          --retries 2
      # timeout 90s/test (was 30s — prevents false fails from slow GitHub→DO API latency)
      # workers 1 — prevents race conditions on single preview server port
      # retries 2 — absorbs transient network hiccups and Preact hydration timing jitter
      timeout-minutes: 32
      env:
        CI: true

    - name: Upload test results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 14

    - name: Upload visual snapshots
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: visual-snapshots-${{ github.event.pull_request.number || github.run_id }}
        path: playwright-report/screenshots/
        retention-days: 1
        if-no-files-found: ignore

    - name: Extract failing test names
      if: failure() && github.event_name == 'pull_request'
      id: failing_tests
      run: |
        # Parse Playwright JSON results for failing test names
        FAILING=""
        if [ -f playwright-report/results.json ]; then
          FAILING=$(node -e "
            const r = require('./playwright-report/results.json');
            const fails = [];
            (r.suites || []).forEach(s => {
              (s.specs || []).forEach(sp => {
                if (sp.tests && sp.tests.some(t => t.status !== 'expected')) {
                  fails.push((s.title ? s.title + ' > ' : '') + sp.title);
                }
              });
            });
            console.log(fails.slice(0, 20).join('\n'));
          " 2>/dev/null || echo "(could not parse results)")
        fi
        echo "FAILING_TESTS<<EOF" >> "$GITHUB_OUTPUT"
        echo "$FAILING" >> "$GITHUB_OUTPUT"
        echo "EOF" >> "$GITHUB_OUTPUT"

    - name: Create or update e2e-fix issue
      if: failure() && github.event_name == 'pull_request'
      uses: actions/github-script@v7
      with:
        script: |
          const prNumber = context.payload.pull_request.number;
          const branch = context.payload.pull_request.head.ref;
          const runUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
          const failingTests = `${{ steps.failing_tests.outputs.FAILING_TESTS }}` || '(see CI log)';
          const prTitle = context.payload.pull_request.title;

          // Ensure labels exist
          const labelDefs = [
            { name: 'e2e-fix', color: 'e11d48', description: 'E2E test failure — auto-fix eligible' },
            { name: 'claude-auto', color: '6366f1', description: 'Auto-fix by JEPO Claude agent' },
          ];
          for (const label of labelDefs) {
            try {
              await github.rest.issues.getLabel({
                owner: context.repo.owner, repo: context.repo.repo, name: label.name
              });
            } catch {
              await github.rest.issues.createLabel({
                owner: context.repo.owner, repo: context.repo.repo, ...label
              }).catch(() => {});
            }
          }

          // Check if an open e2e-fix issue already exists for this branch
          const existing = await github.rest.issues.listForRepo({
            owner: context.repo.owner,
            repo: context.repo.repo,
            labels: 'e2e-fix',
            state: 'open',
          });
          const matchingIssue = existing.data.find(i =>
            i.title.includes(`PR #${prNumber}`) || i.body?.includes(`Branch: \`${branch}\``)
          );

          const issueBody = `## E2E Test Failure

**PR:** #${prNumber} — ${prTitle}
**Branch:** \`${branch}\`
**Run:** https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}

## Failing Tests
\`\`\`
${failingTests}
\`\`\`

## Instructions for Auto-Fix
1. Read the failing test spec in \`tests/e2e/\`
2. Fetch CI log: \`gh run view ${context.runId} --repo ${context.repo.owner}/${context.repo.repo} --log-failed\`
3. Identify root cause (wrong selector, missing i18n key, wrong route, timing)
4. Make minimal fix in source files (NOT in test specs unless test is fundamentally wrong)
5. Create PR targeting \`main\`

*Auto-created by E2E CI — JEPO e2e-autofix agent will process within 10 minutes.*`;

          if (matchingIssue) {
            // Add a comment to the existing issue with new run info
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: matchingIssue.number,
              body: `[E2E-AUTOFIX] New failure on same branch.\nRun: ${runUrl}\n\nFailing tests:\n\`\`\`\n${failingTests}\n\`\`\``,
            });
            // Remove in-progress label if present (allows re-processing)
            await github.rest.issues.removeLabel({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: matchingIssue.number,
              name: 'in-progress',
            }).catch(() => {});
            console.log(`Updated existing issue #${matchingIssue.number}`);
          } else {
            const issue = await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[e2e-fix] E2E failed on PR #${prNumber} (${branch})`,
              body: issueBody,
              labels: ['e2e-fix', 'claude-auto'],
            });
            console.log(`Created issue #${issue.data.number}: ${issue.data.html_url}`);
          }

          // Also post a quick comment on the PR linking to the issue
          await github.rest.issues.createComment({
            owner: context.repo.owner,
            repo: context.repo.repo,
            issue_number: prNumber,
            body: `[E2E-AUTOFIX] Tests failed. JEPO auto-fix agent will analyze and create a fix PR within 10 minutes.\n\nRun: ${runUrl}`,
          });

    - name: Notify failure via Telegram
      if: failure() && github.event_name == 'pull_request'
      env:
        TOKEN: ${{ secrets.PRUVIQ_TELEGRAM_TOKEN }}
        CHAT_ID: ${{ secrets.PRUVIQ_TELEGRAM_CHAT_ID }}
      run: |
        [ -z "$TOKEN" ] || [ -z "$CHAT_ID" ] && exit 0
        PR_NUM="${{ github.event.pull_request.number }}"
        PR_TITLE="${{ github.event.pull_request.title }}"
        BRANCH="${{ github.event.pull_request.head.ref }}"
        RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
        MSG="E2E FAIL: PR #${PR_NUM} (${BRANCH})
        ${PR_TITLE}
        Log: ${RUN_URL}
        OpenClaw autofix will retry within 1 hour."
        curl -sf -X POST "https://api.telegram.org/bot${TOKEN}/sendMessage" \
          -d chat_id="${CHAT_ID}" -d text="${MSG}" || true
