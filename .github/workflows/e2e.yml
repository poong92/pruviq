name: E2E Tests

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  e2e:
    name: Playwright E2E
    # Self-hosted Mac Mini M4 runner — same environment as local dev.
    # CI = local = 재현 100%. Flaky 구분 가능.
    # Fallback: ubuntu-latest (runner 오프라인 시)
    runs-on: [self-hosted, macOS, arm64]
    timeout-minutes: 20
    steps:
    - uses: actions/checkout@v4

    # Self-hosted: Node 22 already installed via Homebrew, no setup-node needed.
    # But ensure correct version is active.
    - name: Use Node 22
      run: |
        node --version
        npm --version

    - name: Install dependencies
      run: npm ci

    - name: Install Chromium
      run: npx playwright install chromium
      # Self-hosted: --with-deps 불필요 (macOS system deps 불필요)

    - name: Check i18n key completeness
      run: npx tsx scripts/check-i18n-keys.ts

    - name: Build site
      run: npm run build

    - name: Check API health
      run: |
        echo "Checking api.pruviq.com reachability..."
        for i in {1..6}; do
          STATUS=$(curl -sf -o /dev/null -w "%{http_code}" \
            https://api.pruviq.com/health --max-time 10 || echo "000")
          if [ "$STATUS" = "200" ]; then
            echo "API healthy (attempt $i)"
            exit 0
          fi
          echo "Attempt $i: HTTP $STATUS — retrying in 10s..."
          sleep 10
        done
        echo "::warning::API unreachable after 60s — API-dependent tests will skip"

    - name: Run E2E tests
      id: e2e
      run: |
        npx playwright test tests/e2e/ \
          --timeout 60000 \
          --workers 2 \
          --retries 1
      # Self-hosted M4: timeout 60s (로컬 레이턴시, 이전 90s 불필요)
      # workers 2 (M4 Pro 성능 활용, CI 단일 포트 충돌 없음)
      # retries 1 (진짜 flaky면 재현 가능, 1회만)
      timeout-minutes: 15
      env:
        CI: true

    - name: Upload test results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 14

    - name: Upload visual snapshots
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: visual-snapshots-${{ github.event.pull_request.number || github.run_id }}
        path: playwright-report/screenshots/
        retention-days: 1
        if-no-files-found: ignore

    # ── Failure handling ─────────────────────────────────────────
    # Self-hosted이므로 실패 = 로컬과 동일 환경 실패 = 진짜 코드 버그.
    # Flaky 재시도는 --retries 1이 이미 커버.
    # 따라서 실패 시 바로 e2e-fix 이슈 생성 (불필요한 job-level 재시도 없음).

    - name: Extract failing test names
      if: failure() && github.event_name == 'pull_request'
      id: failing_tests
      run: |
        FAILING=""
        if [ -f playwright-report/results.json ]; then
          FAILING=$(node -e "
            const r = require('./playwright-report/results.json');
            const fails = [];
            (r.suites || []).forEach(s => {
              (s.specs || []).forEach(sp => {
                if (sp.tests && sp.tests.some(t => t.status !== 'expected')) {
                  fails.push((s.title ? s.title + ' > ' : '') + sp.title);
                }
              });
            });
            console.log(fails.slice(0, 20).join('\n'));
          " 2>/dev/null || echo "(could not parse results)")
        fi
        echo "FAILING_TESTS<<EOF" >> "$GITHUB_OUTPUT"
        echo "$FAILING" >> "$GITHUB_OUTPUT"
        echo "EOF" >> "$GITHUB_OUTPUT"

    - name: Create or update e2e-fix issue
      if: failure() && github.event_name == 'pull_request'
      uses: actions/github-script@v7
      with:
        script: |
          const prNumber = context.payload.pull_request.number;
          const branch = context.payload.pull_request.head.ref;
          const runUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
          const failingTests = `${{ steps.failing_tests.outputs.FAILING_TESTS }}` || '(see CI log)';
          const prTitle = context.payload.pull_request.title;

          // Ensure labels exist
          for (const label of [
            { name: 'e2e-fix', color: 'e11d48', description: 'E2E test failure — auto-fix eligible' },
            { name: 'claude-auto', color: '6366f1', description: 'Auto-fix by JEPO Claude agent' },
          ]) {
            await github.rest.issues.getLabel({
              owner: context.repo.owner, repo: context.repo.repo, name: label.name
            }).catch(() => github.rest.issues.createLabel({
              owner: context.repo.owner, repo: context.repo.repo, ...label
            }).catch(() => {}));
          }

          // Check for existing open e2e-fix issue for this branch
          const existing = await github.rest.issues.listForRepo({
            owner: context.repo.owner, repo: context.repo.repo,
            labels: 'e2e-fix', state: 'open',
          });
          const matchingIssue = existing.data.find(i =>
            i.title.includes(`PR #${prNumber}`) || i.body?.includes(`Branch: \`${branch}\``)
          );

          const issueBody = `## E2E Test Failure (Self-hosted Mac Mini)

**PR:** #${prNumber} — ${prTitle}
**Branch:** \`${branch}\`
**Run:** ${runUrl}
**Runner:** self-hosted macOS arm64 (로컬과 동일 환경 — 재현 가능)

## Failing Tests
\`\`\`
${failingTests}
\`\`\`

## Note
Self-hosted runner이므로 이 실패는 \`~/pruviq\` 에서 재현 가능합니다:
\`\`\`bash
cd ~/pruviq && npm run build && npx playwright test tests/e2e/ --timeout 60000 --workers 2
\`\`\`

*Auto-created by E2E CI — JEPO e2e-autofix agent will reproduce + fix within 20 minutes.*`;

          if (matchingIssue) {
            await github.rest.issues.createComment({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: matchingIssue.number,
              body: `[E2E-AUTOFIX] New failure.\nRun: ${runUrl}\n\nFailing:\n\`\`\`\n${failingTests}\n\`\`\``,
            });
            await github.rest.issues.removeLabel({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: matchingIssue.number, name: 'in-progress',
            }).catch(() => {});
            console.log(`Updated issue #${matchingIssue.number}`);
          } else {
            const issue = await github.rest.issues.create({
              owner: context.repo.owner, repo: context.repo.repo,
              title: `[e2e-fix] E2E failed on PR #${prNumber} (${branch})`,
              body: issueBody,
              labels: ['e2e-fix', 'claude-auto'],
            });
            console.log(`Created issue #${issue.data.number}: ${issue.data.html_url}`);
          }

          await github.rest.issues.createComment({
            owner: context.repo.owner, repo: context.repo.repo,
            issue_number: prNumber,
            body: `[E2E-AUTOFIX] Tests failed on self-hosted runner. JEPO agent will reproduce + fix within 20 minutes.\n\nRun: ${runUrl}`,
          });

    - name: Notify failure via Telegram
      if: failure() && github.event_name == 'pull_request'
      env:
        TOKEN: ${{ secrets.PRUVIQ_TELEGRAM_TOKEN }}
        CHAT_ID: ${{ secrets.PRUVIQ_TELEGRAM_CHAT_ID }}
      run: |
        [ -z "$TOKEN" ] || [ -z "$CHAT_ID" ] && exit 0
        PR_NUM="${{ github.event.pull_request.number }}"
        BRANCH="${{ github.event.pull_request.head.ref }}"
        RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
        MSG="E2E FAIL (self-hosted): PR #${PR_NUM} (${BRANCH})
        Log: ${RUN_URL}
        JEPO autofix 20분 이내 수정 예정"
        curl -sf -X POST "https://api.telegram.org/bot${TOKEN}/sendMessage" \
          -d chat_id="${CHAT_ID}" -d text="${MSG}" || true
