name: Accessibility

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  accessibility:
    name: axe Accessibility Audit
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-node@v4
      with:
        node-version: '22'

    - name: Install dependencies
      run: npm ci

    - name: Build site
      run: npm run build

    - name: Install axe CLI + browsers
      run: |
        npm install -g @axe-core/cli
        npx playwright install --with-deps chromium

    - name: Start preview server
      run: |
        npx astro preview --host 0.0.0.0 --port 4321 &
        sleep 5

    - name: Run axe on key pages
      run: |
        echo "=== EN Home ==="
        axe http://localhost:4321 --exit || true
        echo ""
        echo "=== KO Home ==="
        axe http://localhost:4321/ko/ --exit || true
        echo ""
        echo "=== Performance ==="
        axe http://localhost:4321/performance --exit || true
        echo ""
        echo "=== Simulate ==="
        axe http://localhost:4321/simulate --exit || true
