name: Unit Tests

# Vitest harness wasn't wired to CI — 6 tests in tests/unit/ ran locally but
# every PR shipped without them. This job catches regressions that are too
# small for e2e (i18n keys, site-stats SSoT, exchange list invariants, etc.)
# on a cheap ubuntu runner so it stays off the Mac Mini self-hosted queue.

on:
  pull_request:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: unit-tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  vitest:
    name: Vitest
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Detect data-only PR
        id: gate
        run: |
          git fetch origin main --depth=1 2>/dev/null || true
          CHANGED=$(git diff --name-only origin/main HEAD 2>/dev/null || echo "")
          if [ -z "$CHANGED" ] || echo "$CHANGED" | grep -qvE '^public/data/'; then
            echo "skip=false" >> "$GITHUB_OUTPUT"
          else
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Data-only change — skipping Vitest"
          fi

      - name: Setup Node 22
        if: steps.gate.outputs.skip != 'true'
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        if: steps.gate.outputs.skip != 'true'
        run: npm ci

      - name: Run vitest
        if: steps.gate.outputs.skip != 'true'
        run: npm run test:unit
