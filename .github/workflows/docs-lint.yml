name: "QA: docs-lint (legacy drift prevention)"

# PR-blocking 가드. 과거에 (1) 루트 `/Users/openclaw/` 경로 오염, (2) Mac Mini
# 백엔드 오기록 드리프트, (3) OpenClaw 프로젝트 잔재 3종이 반복 재발. 이 워크
# 플로우가 각각을 grep 레벨에서 차단.

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - "**/*.md"
      - "**/*.yml"
      - "**/*.yaml"
      - "**/*.json"
      - "**/*.py"
      - "**/*.ts"
      - "**/*.tsx"
      - "**/*.sh"
      - "**/*.astro"
      - ".github/workflows/docs-lint.yml"
  workflow_dispatch: {}

concurrency:
  group: docs-lint-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v4

      # Guard 1 — /Users/openclaw/ 경로 오염 (2026-04-25 재발 사례 있음)
      - name: "Guard 1: /Users/openclaw/ path pollution"
        run: |
          set +e
          MATCHES=$(grep -rn '/Users/openclaw' \
            --include='*.md' --include='*.yml' --include='*.yaml' \
            --include='*.json' --include='*.py' --include='*.ts' --include='*.tsx' \
            --include='*.sh' --include='*.astro' --include='*.mjs' \
            --exclude-dir=node_modules --exclude-dir=.git --exclude-dir=.venv \
            --exclude-dir=.claude --exclude-dir=playwright-report \
            --exclude=docs-lint.yml \
            .)
          if [ -n "$MATCHES" ]; then
            echo "::error::'/Users/openclaw/' path found — must be '/Users/jepo/pruviq/'"
            echo "$MATCHES"
            exit 1
          fi
          echo "✓ Guard 1 passed"

      # Guard 2 — OpenClaw 프로젝트 재유입 방지 (archive/ 제외, worktrees 제외)
      - name: "Guard 2: OpenClaw references outside archive/"
        run: |
          set +e
          MATCHES=$(grep -rni 'openclaw' \
            --include='*.md' --include='*.yml' --include='*.yaml' \
            --include='*.json' --include='*.py' --include='*.ts' --include='*.tsx' \
            --include='*.sh' --include='*.astro' --include='*.mjs' \
            --exclude-dir=node_modules --exclude-dir=.git --exclude-dir=.venv \
            --exclude-dir=.claude --exclude-dir=playwright-report \
            --exclude=docs-lint.yml \
            . | grep -v '^\./docs/archive/' || true)
          if [ -n "$MATCHES" ]; then
            echo "::error::OpenClaw references found outside docs/archive/"
            echo "$MATCHES"
            exit 1
          fi
          echo "✓ Guard 2 passed"

      # Guard 3 — Mac Mini 백엔드 오기록 (특정 드리프트 문자열만 차단,
      # "Mac Mini is dev-only" 같은 올바른 기록은 허용)
      - name: "Guard 3: stale Mac Mini backend claims"
        run: |
          set +e
          # 명확히 틀린 조합만 체크:
          #   - "port 8400" (과거 Mac Mini uvicorn 포트, 현재 DO는 :8080)
          #   - "172.30.1.16" (Mac Mini LAN IP, docs에 하드코딩 금지)
          #   - "jepo@172.30.1.16" (Mac Mini SSH 대상, 과거 운영 명령)
          MATCHES=$(grep -rnE '172\.30\.1\.16|port 8400|Mac Mini.*uvicorn|Mac Mini.*FastAPI' \
            --include='*.md' --include='*.yml' --include='*.yaml' \
            --include='*.json' --include='*.py' --include='*.ts' --include='*.tsx' \
            --include='*.sh' --include='*.astro' --include='*.mjs' \
            --exclude-dir=node_modules --exclude-dir=.git --exclude-dir=.venv \
            --exclude-dir=.claude --exclude-dir=playwright-report \
            --exclude=docs-lint.yml \
            . | grep -v '^\./docs/archive/' || true)
          if [ -n "$MATCHES" ]; then
            echo "::error::Stale Mac Mini backend claim — current backend runs on DigitalOcean (host in DO_HOST secret, port 2222 SSH, :8080 app). Mac Mini is dev-only."
            echo "$MATCHES"
            exit 1
          fi
          echo "✓ Guard 3 passed"

      - name: "Summary"
        run: echo "All 3 drift-prevention guards passed."
