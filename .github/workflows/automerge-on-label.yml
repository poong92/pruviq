name: Auto-merge labeled PRs

on:
  pull_request:
    types: [labeled]

permissions:
  contents: write
  pull-requests: write

jobs:
  enable-automerge:
    if: github.event.label.name == 'automerge'
    runs-on: ubuntu-latest
    steps:
      - name: Block backend/ changes
        uses: actions/github-script@v7
        with:
          script: |
            const restrictedPrefixes = ['backend/'];
            const prNumber = context.payload.pull_request.number;

            const files = await github.paginate(github.rest.pulls.listFiles, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber,
            });

            for (const f of files) {
              for (const prefix of restrictedPrefixes) {
                if (f.filename.startsWith(prefix)) {
                  core.setFailed(`PR touches restricted path: ${f.filename}`);
                  return;
                }
              }
            }
            core.info(`PR #${prNumber} — no restricted paths. Enabling automerge.`);

      - name: Enable GitHub native automerge
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr merge ${{ github.event.pull_request.number }} \
            --auto \
            --squash \
            --repo ${{ github.repository }}
