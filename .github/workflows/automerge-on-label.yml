name: Auto-merge labeled PRs

on:
  pull_request:
    types: [labeled]
  check_suite:
    types: [completed]   # fires on every check completion — no hardcoded workflow list needed
  # 2026-04-26: schedule safety net. check_suite events are unreliable —
  # GitHub sometimes does not fire check_suite.completed for the LAST workflow
  # in a fan-out (observed in PR #1379 and #1393: all checks SUCCESS, mergeable
  # CLEAN, but attempt-merge never re-triggered after Playwright finished).
  #
  # 2026-04-30: bumped from */10 to */3. Cron remains the *fallback* for
  # webhook drops; happy path is still pull_request.labeled + check_suite.
  # User-perceived "PR ready → live" window was dominated by ~5min average
  # cron-wait when webhooks dropped. */3 cuts fallback latency by 3.3×
  # while staying above GitHub's ~5min schedule coalesce/drop threshold
  # (avoiding */1 reliability risk). SHA-keyed concurrency below serializes
  # the higher trigger frequency safely.
  schedule:
    - cron: '*/3 * * * *'
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write
  checks: read
  # 2026-04-30: explicit data-deploy dispatch on successful merge — workaround
  # for GitHub push-event silent drops observed on #1594, #1599 even after the
  # paths-filter removal in #1586. Only `actions: write` is needed for
  # workflow_dispatch via github.rest.actions.createWorkflowDispatch.
  actions: write

concurrency:
  # Per-SHA queue — different PRs don't cancel each other
  # check_suite uses head_sha; workflow_dispatch uses run_id
  group: automerge-${{ github.event.pull_request.number || github.event.check_suite.head_sha || github.run_id }}
  cancel-in-progress: true

jobs:
  attempt-merge:
    runs-on: ubuntu-latest
    steps:
      - name: Attempt auto-merge if labeled and checks pass
        uses: actions/github-script@v9
        with:
          # AUTOMERGE_PAT (repo+workflow scopes, repo owner account) is required for
          # update-branch and empty-commit pushes to fire pull_request.synchronize events.
          # GITHUB_TOKEN pushes are silently blocked by GitHub to prevent workflow loops,
          # so CI triggered after a GITHUB_TOKEN push never appears in statusCheckRollup
          # → branch protection blocks merge forever. PAT-authenticated pushes are not
          # subject to this restriction and DO fire pull_request.synchronize correctly.
          github-token: ${{ secrets.AUTOMERGE_PAT || secrets.GITHUB_TOKEN }}
          script: |
            const labelName = 'automerge';
            const restrictedExactFiles = [
              'astro.config.mjs',
              'wrangler.toml',
              'wrangler.jsonc',
              'public/_redirects',
              'playwright.config.ts',
            ];
            const MIN_CHECK_RUNS = 2;

            // ── Process a single PR ───────────────────────────────────────────────
            async function processPR(pr) {
              const prNumber = pr.number;
              core.info(`Found PR #${prNumber}`);

              const labels = pr.labels ? pr.labels.map(l => l.name) : [];
              if (!labels.includes(labelName)) {
                core.info(`PR #${prNumber} no longer has ${labelName} label; skipping.`);
                return;
              }

              // Restricted files check
              const files = await github.paginate(github.rest.pulls.listFiles, {
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: prNumber,
              });
              const restrictedHits = files.filter(f => restrictedExactFiles.includes(f.filename));
              if (restrictedHits.length > 0) {
                const list = restrictedHits.map(f => `- \`${f.filename}\``).join('\n');
                core.info(`PR #${prNumber}: touches restricted files — skipping`);
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: prNumber,
                  body: `⚠️ **Auto-merge skipped** — infrastructure files detected:\n${list}\n\nManual merge required after review.`,
                });
                return;
              }

              const headSha = pr.head?.sha;
              if (!headSha) { core.info(`PR #${prNumber}: no head SHA; skipping`); return; }

              // Check-runs status
              const { data: checksData } = await github.rest.checks.listForRef({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: headSha,
              });
              // Deduplicate: keep only the latest run per check name.
              // Stale cancelled/queued runs (e.g. from a superseded CI trigger) would
              // otherwise permanently block merge even when the latest run is success.
              const allRuns = checksData.check_runs.filter(c => c.name !== 'attempt-merge');
              const latestByName = new Map();
              for (const run of allRuns) {
                const existing = latestByName.get(run.name);
                if (!existing || new Date(run.started_at) > new Date(existing.started_at)) {
                  latestByName.set(run.name, run);
                }
              }
              const checkRuns = Array.from(latestByName.values());
              const total = checkRuns.length;
              const allCompleted = checkRuns.every(c => c.status === 'completed');
              const allSuccess = checkRuns.every(c => c.conclusion === 'success' || c.conclusion === 'skipped');

              core.info(`Check runs for ${headSha}: ${total} total, allCompleted=${allCompleted}, allSuccess=${allSuccess}`);
              checkRuns.forEach(c => core.info(`  - ${c.name}: ${c.status} / ${c.conclusion}`));

              if (total < MIN_CHECK_RUNS) {
                core.info(`PR #${prNumber}: only ${total} check runs (min ${MIN_CHECK_RUNS}); waiting`);
                return;
              }
              if (!allCompleted) {
                core.info(`PR #${prNumber}: checks still running; will retry when next check completes`);
                return;
              }
              if (!allSuccess) {
                core.info(`PR #${prNumber}: some checks failed; skipping`);
                return;
              }

              // BEHIND check → update-branch + dispatch CI
              // 2026-05-08 Fix 3: Always use fresh mainSha from getRef — never rely on
              // mergeable_state or prDetail.base.sha (both stale/async-computed by GitHub).
              // Evidence: 09:50 run — compareCommits(base=pr_head, head=prDetail.base.sha)
              // returned ahead_by=0 (stale base.sha already in PR history) but merge still
              // failed 405 — GraphQL mergeStateStatus=BEHIND was correct, REST was stale.
              // Fix: getRef('heads/main') gives fresh mainSha, bypassing both stale fields.
              const { data: prDetail } = await github.rest.pulls.get({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: prNumber,
              });
              let actuallyBehind = false;
              try {
                const { data: mainRef } = await github.rest.git.getRef({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  ref: 'heads/main',
                });
                const mainSha = mainRef.object.sha;
                const { data: cmp } = await github.rest.repos.compareCommits({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  base: prDetail.head.sha,
                  head: mainSha,
                });
                actuallyBehind = cmp.ahead_by > 0; // main is ahead of feature = feature is behind
                core.info(`PR #${prNumber}: pr_head=${prDetail.head.sha.slice(0,7)} main=${mainSha.slice(0,7)} ahead_by=${cmp.ahead_by}`);
              } catch (cmpErr) {
                core.warning(`PR #${prNumber}: compare API failed (${cmpErr.message}), assuming up-to-date`);
              }
              core.info(`PR #${prNumber}: mergeable_state=${prDetail.mergeable_state}, actuallyBehind=${actuallyBehind}`);
              if (actuallyBehind) {
                core.info(`PR #${prNumber}: BEHIND main — triggering update-branch`);
                try {
                  await github.rest.pulls.updateBranch({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    pull_number: prNumber,
                  });
                  core.info(`PR #${prNumber}: update-branch dispatched — pull_request.synchronize will trigger CI`);
                } catch (err) {
                  core.warning(`PR #${prNumber}: update-branch failed: ${err.message}`);
                  return;
                }
                // No manual createWorkflowDispatch here: updateBranch() via AUTOMERGE_PAT
                // fires pull_request.synchronize which triggers all CI workflows automatically.
                // Manual dispatch caused duplicate Playwright runs → cancelled stale runs →
                // allSuccess=false → permanent merge block.
                return;
              }

              // Merge
              let mergeSucceeded = false;
              try {
                await github.rest.pulls.merge({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  pull_number: prNumber,
                  merge_method: 'squash',
                });
                core.info(`PR #${prNumber}: merged successfully`);
                mergeSucceeded = true;
              } catch (err) {
                // 2026-05-08 reactive fallback: if merge fails with 405 (branch BEHIND at merge
                // time — data-refresh cron raced with CI window), auto-trigger update-branch so
                // CI re-runs on fresh HEAD. automerge retries on next check_suite.completed.
                // This breaks the manual-intervention loop without user action.
                if (err.status === 405 || (err.message && err.message.includes('Repository rule violations'))) {
                  core.info(`PR #${prNumber}: merge blocked (405) — branch likely BEHIND at merge time; triggering update-branch`);
                  try {
                    await github.rest.pulls.updateBranch({
                      owner: context.repo.owner,
                      repo: context.repo.repo,
                      pull_number: prNumber,
                    });
                    core.info(`PR #${prNumber}: update-branch dispatched — CI will re-run, automerge retries on check_suite.completed`);
                  } catch (ubErr) {
                    core.warning(`PR #${prNumber}: update-branch fallback failed: ${ubErr.message}`);
                  }
                } else {
                  core.warning(`PR #${prNumber}: merge failed: ${err.message}`);
                }
              }

              // data-deploy dispatch after successful merge
              if (mergeSucceeded) {
                try {
                  await github.rest.actions.createWorkflowDispatch({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    workflow_id: 'data-deploy.yml',
                    ref: 'main',
                  });
                  core.info(`Dispatched data-deploy.yml on main for PR #${prNumber}`);
                } catch (err) {
                  core.warning(`data-deploy dispatch failed (push event or 1h cron will backstop): ${err.message}`);
                }
              }
            }

            // ── Route by event → collect PRs to process ───────────────────────────

            let prsToProcess = [];

            if (context.eventName === 'pull_request') {
              prsToProcess = [context.payload.pull_request];

            } else if (context.eventName === 'check_suite') {
              const headSha = context.payload.check_suite.head_sha;
              const { data: associated } = await github.rest.repos.listPullRequestsAssociatedWithCommit({
                owner: context.repo.owner,
                repo: context.repo.repo,
                commit_sha: headSha,
              });
              const candidate = associated.find(
                p => p.state === 'open' && p.labels.some(l => l.name === labelName)
              );
              if (!candidate) {
                core.info(`No open labeled PRs for commit ${headSha}`);
                return;
              }
              prsToProcess = [candidate];

            } else if (context.eventName === 'workflow_dispatch' || context.eventName === 'schedule') {
              // 2026-05-05: Process ALL labeled PRs per tick (not just first).
              // Previous design processed only the first labeled PR, so a stuck PR
              // (e.g. Claude check-suite queued on PR #1712) blocked the entire queue
              // — PRs #1709-1711 waited hours while #1712 failed on every cron tick.
              const openPRs = await github.paginate(github.rest.pulls.list, {
                owner: context.repo.owner,
                repo: context.repo.repo,
                state: 'open',
                per_page: 50,
              });
              prsToProcess = openPRs.filter(p => p.labels.some(l => l.name === labelName));
              if (prsToProcess.length === 0) {
                core.info(`No open PRs with automerge label (event=${context.eventName})`);
                return;
              }
              core.info(`Found ${prsToProcess.length} labeled PRs to process`);

            } else {
              core.info(`Unsupported event: ${context.eventName}`);
              return;
            }

            for (const pr of prsToProcess) {
              await processPR(pr);
            }
