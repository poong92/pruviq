name: "Post-Deploy: Production Smoke"

# Triggers after every push to main.
# Waits for Cloudflare Pages deployment, then tests the LIVE site directly.
# This is the only workflow that tests pruviq.com — all other E2E tests hit localhost.
on:
  push:
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: post-deploy-smoke
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  smoke:
    name: Production Smoke — pruviq.com
    runs-on: [self-hosted, ops]
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Use Node 22
        run: node --version && npm --version

      - name: Install dependencies
        run: npm ci

      - name: Install Chromium
        run: npx playwright install chromium

      - name: Wait for Cloudflare Pages deployment
        run: |
          echo "Waiting 90s for Cloudflare Pages to propagate..."
          sleep 90
          # Verify site is up before running tests
          for i in {1..6}; do
            STATUS=$(curl -sL -A "Mozilla/5.0" -o /dev/null -w '%{http_code}' \
              https://pruviq.com --max-time 10 || echo "000")
            echo "Attempt $i: HTTP $STATUS"
            if [ "$STATUS" = "200" ]; then
              echo "Site is up — proceeding with smoke tests"
              exit 0
            fi
            sleep 10
          done
          echo "::error::pruviq.com not reachable after 150s"
          exit 1

      - name: Run simulator golden harness
        run: npx tsx tests/harness/run-golden.ts
        env:
          BASE_URL: https://api.pruviq.com
        timeout-minutes: 3

      - name: Run production smoke tests (Playwright)
        id: smoke
        run: |
          npx playwright test tests/e2e/prod-smoke.spec.ts \
            --project prod-smoke \
            --timeout 30000 \
            --workers 2 \
            --retries 1
        env:
          BASE_URL: https://pruviq.com
          CI: true
        timeout-minutes: 6

      - name: Run interactive QA (버튼 클릭 · 기능 검증)
        id: interactive
        run: |
          mkdir -p test-results/interactive
          npx playwright test tests/e2e/interactive-qa.spec.ts \
            --project prod-smoke \
            --timeout 60000 \
            --workers 1 \
            --retries 1
        env:
          BASE_URL: https://pruviq.com
          CI: true
        timeout-minutes: 6
        continue-on-error: true

      - name: Verify demo JSON ↔ API parity
        run: bash scripts/verify-demo-api-parity.sh
        env:
          API_BASE_URL: https://api.pruviq.com
        timeout-minutes: 2
        continue-on-error: true

      - name: Upload smoke test report + interactive screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: prod-smoke-report-${{ github.run_id }}
          path: |
            playwright-report/
            test-results/harness/golden-result.json
            test-results/interactive/*.png
          retention-days: 7

      - name: Notify success via Telegram
        if: success()
        env:
          TOKEN: ${{ secrets.PRUVIQ_TELEGRAM_TOKEN }}
          CHAT_ID: ${{ secrets.PRUVIQ_TELEGRAM_CHAT_ID }}
          COMMIT: ${{ github.event.head_commit.message }}
          SHA: ${{ github.sha }}
        run: |
          [ -z "$TOKEN" ] && exit 0
          [ -z "$CHAT_ID" ] && exit 0
          COMMIT_SHORT=$(echo "$COMMIT" | head -1 | cut -c1-60)
          MSG=$(printf '✅ PRUVIQ Deploy Smoke PASS\nCommit: %s\nSHA: %s\nSite: https://pruviq.com\nAll SSR + ranking + coin count checks passed.' "${COMMIT_SHORT}" "${SHA:0:7}")
          curl -sf -X POST "https://api.telegram.org/bot${TOKEN}/sendMessage" \
            --data-urlencode "chat_id=${CHAT_ID}" \
            --data-urlencode "text=${MSG}" \
            --data-urlencode "parse_mode=HTML" \
            || echo "::warning::Telegram notify failed (non-blocking)"

      - name: Notify failure via Telegram
        if: failure()
        env:
          TOKEN: ${{ secrets.PRUVIQ_TELEGRAM_TOKEN }}
          CHAT_ID: ${{ secrets.PRUVIQ_TELEGRAM_CHAT_ID }}
          COMMIT: ${{ github.event.head_commit.message }}
          RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          [ -z "$TOKEN" ] && exit 0
          [ -z "$CHAT_ID" ] && exit 0
          COMMIT_SHORT=$(echo "$COMMIT" | head -1 | cut -c1-60)
          MSG=$(printf '🚨 PRUVIQ Deploy Smoke FAIL\nCommit: %s\nLog: %s\n\nCheck: SSR blank? Stale coin count? JS crash? KO parity?' "${COMMIT_SHORT}" "${RUN_URL}")
          curl -sf -X POST "https://api.telegram.org/bot${TOKEN}/sendMessage" \
            --data-urlencode "chat_id=${CHAT_ID}" \
            --data-urlencode "text=${MSG}" \
            --data-urlencode "parse_mode=HTML" \
            || echo "::warning::Telegram notify failed (non-blocking)"

      - name: Create issue on smoke failure
        if: failure() && github.event_name == 'push'
        uses: actions/github-script@v7
        env:
          COMMIT_MSG: ${{ github.event.head_commit.message }}
          RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
          SHA: ${{ github.sha }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN || '' }}
        with:
          script: |
            const commitMsg = process.env.COMMIT_MSG?.split('\n')[0]?.slice(0, 80) || '(no message)';
            const runUrl = process.env.RUN_URL;
            const sha = process.env.SHA?.slice(0, 7);

            // Check if there's already an open smoke-fail issue for this commit
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'smoke-fail',
              state: 'open',
            });
            if (existing.data.length > 0) {
              // Update existing issue with new failure
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.data[0].number,
                body: `New smoke failure on \`${sha}\`: ${commitMsg}\nRun: ${runUrl}`,
              });
              return;
            }

            // Auto-rollback: revert to previous Workers deployment
            try {
              const acctId = '9314e06569c4da23e48fd088d45707dd';
              const scriptName = 'pruviq-website';
              // Self-hosted runner: token from env or ~/.secrets.env
              let cfToken = process.env.CLOUDFLARE_API_TOKEN;
              if (!cfToken) {
                try {
                  const fs = require('fs');
                  const envFile = fs.readFileSync(`${process.env.HOME}/.secrets.env`, 'utf8');
                  const match = envFile.match(/CLOUDFLARE_API_TOKEN=(\S+)/);
                  if (match) cfToken = match[1];
                } catch {}
              }
              if (!cfToken) throw new Error('No CF token');
              const depsResp = await fetch(
                `https://api.cloudflare.com/client/v4/accounts/${acctId}/workers/scripts/${scriptName}/deployments`,
                { headers: { 'Authorization': `Bearer ${cfToken}` } }
              );
              const depsData = await depsResp.json();
              const deployments = depsData?.result?.deployments || [];
              if (deployments.length >= 2) {
                const prevId = deployments[1].id;
                const rollResp = await fetch(
                  `https://api.cloudflare.com/client/v4/accounts/${acctId}/workers/deployments/by-script/${scriptName}/detail/${prevId}/rollback`,
                  { method: 'PUT', headers: { 'Authorization': `Bearer ${cfToken}` } }
                );
                const rollData = await rollResp.json();
                core.info(`Auto-rollback: ${rollData.success ? 'SUCCESS' : 'FAILED'} → ${prevId.slice(0,12)}`);
              }
            } catch (e) {
              core.warning(`Auto-rollback failed: ${e.message}`);
            }

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[smoke-fail] Production smoke failed on ${sha} (auto-rolled back)`,
              body: [
                '## Production Smoke Test Failure',
                '',
                `**Commit:** \`${sha}\` — ${commitMsg}`,
                `**Run:** ${runUrl}`,
                '',
                '## What to check',
                '- [ ] SSR blank page: `/strategies/ranking` or `/ko/strategies/ranking` has `#ranking-ssr-fallback` with data?',
                '- [ ] Stale coin count: HTML contains `549+` or `549개` instead of `569+`?',
                '- [ ] JS crash: component throws on real API data?',
                '- [ ] KO/EN parity: KO pages have Korean text?',
                '- [ ] HTTP 200: critical pages returning 4xx/5xx?',
                '',
                '## Reproduce locally',
                '```bash',
                'BASE_URL=https://pruviq.com npx playwright test tests/e2e/prod-smoke.spec.ts --project prod-smoke',
                '```',
              ].join('\n'),
              labels: ['smoke-fail', 'claude-auto'],
            });
