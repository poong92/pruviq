# Dependabot — weekly dependency security updates (architecture-audit + automation-audit CRITICAL).
# Opens PRs with `automerge` label when CI passes, so the cascade handles them like any other PR.
version: 2

updates:
  # Python backend
  - package-ecosystem: "pip"
    directory: "/backend"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "04:00"
      timezone: "Asia/Seoul"
    open-pull-requests-limit: 3
    labels:
      - "dependencies"
      - "automerge"
    commit-message:
      prefix: "deps(backend)"
    groups:
      # Group minor/patch updates to reduce PR noise.
      # Major version bumps stay separate for manual review.
      backend-minor:
        patterns: ["*"]
        update-types: ["minor", "patch"]

  # Frontend JS
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "04:30"
      timezone: "Asia/Seoul"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "automerge"
    commit-message:
      prefix: "deps(frontend)"
    groups:
      frontend-minor:
        patterns: ["*"]
        update-types: ["minor", "patch"]
      # Major frontend bumps (preact/astro/tailwind) — manual only; no group
      # so they surface individually.
    ignore:
      # Playwright browser snapshots drift too fast; only test infra cares.
      - dependency-name: "@playwright/test"
        update-types: ["version-update:semver-patch"]
      # astro ecosystem major bumps need coordinated upgrades (astro +
      # @astrojs/preact + @astrojs/sitemap must move together, each major
      # has codemod-level breaking changes). Dependabot doesn't group these
      # so major PRs ship one-at-a-time and break the build. 2026-04-20
      # @astrojs/preact 4→5 alone broke main for 1h (incompatible with
      # astro 5.x). Block auto-opened major bumps; handle astro majors as
      # a dedicated feature PR.
      - dependency-name: "astro"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@astrojs/preact"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@astrojs/sitemap"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@astrojs/rss"
        update-types: ["version-update:semver-major"]

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "05:00"
      timezone: "Asia/Seoul"
    open-pull-requests-limit: 3
    labels:
      - "dependencies"
      - "automerge"
    commit-message:
      prefix: "deps(actions)"
